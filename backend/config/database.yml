default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  host: <%= ENV.fetch('DATABASE_HOST', 'localhost') %>
  username: <%= ENV.fetch('DATABASE_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DATABASE_PASSWORD', 'postgres') %>

development:
  <<: *default
  database: <%= ENV.fetch('DATABASE_NAME', 'rails_demo_development') %>

test:
  <<: *default
  database: rails_demo_test

production:
  <<: *default
  database: <%= ENV.fetch('DATABASE_NAME', 'rails_demo_production') %>
