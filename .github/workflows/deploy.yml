name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rails_demo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true
          working-directory: backend

      - name: Run Rails tests
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_HOST: localhost
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: rails_demo_test
          JWT_SECRET: test_jwt_secret
        run: |
          bundle exec rails db:prepare
          bundle exec rails test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run test

  build-and-push:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rails-latest
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rails_demo-frontend-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: VITE_API_URL=/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export APP_DIR=~/rails_demo
            export GITHUB_REPO='${{ github.repository }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export SECRET_KEY_BASE='${{ secrets.SECRET_KEY_BASE }}'
            export DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'
            export DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}'
            export GITHUB_TOKEN='${{ secrets.DEPLOY_GITHUB_TOKEN }}'

            # Minimal packages so we can clone the repo (full setup runs in scripts/ec2-bootstrap.sh).
            if command -v apt-get >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl git
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y ca-certificates curl git
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y ca-certificates curl git
            else
              echo "No supported package manager (apt-get, dnf, yum) found." >&2
              exit 1
            fi

            CLONE_URL="https://github.com/${GITHUB_REPO}.git"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              CLONE_URL="https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$CLONE_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main

            chmod +x scripts/ec2-bootstrap.sh
            exec bash scripts/ec2-bootstrap.sh
