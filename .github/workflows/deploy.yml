name: CI/CD

# Secrets: set defaults in Repository secrets. Override per environment
# (staging / production) only when a value must differ. GitHub resolves
# secrets.NAME as environment secret if present, otherwise repository secret.

env:
  BACKEND_IMAGE_REPO: rails_demo-backend
  FRONTEND_IMAGE_REPO: rails_demo-frontend
  DEFAULT_VITE_API_URL: /api

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rails_demo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true
          working-directory: backend

      - name: Run Rails tests
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_HOST: localhost
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: rails_demo_test
          JWT_SECRET: test_jwt_secret
        run: |
          bundle exec rails db:prepare
          bundle exec rails test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run test

  build-and-push-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty. Set it as a Repository secret, or remove a blank override from the staging environment."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_TOKEN is empty. Set it as a Repository secret, or remove a blank override from the staging environment."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_REPO }}:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_REPO }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || secrets.FRONTEND_API_URL || env.DEFAULT_VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_REPO }}:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_REPO }}:${{ github.sha }}

  build-and-push-production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty. Set it as a Repository secret, or remove a blank override from the production environment."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_TOKEN is empty. Set it as a Repository secret, or remove a blank override from the production environment."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_REPO }}:production
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_REPO }}:${{ github.ref_name }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || secrets.FRONTEND_API_URL || env.DEFAULT_VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_REPO }}:production
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_REPO }}:${{ github.ref_name }}

  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-push-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || secrets.FRONTEND_API_URL || '/api' }}
          FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL || secrets.VITE_API_URL || '/api' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,JWT_SECRET,SECRET_KEY_BASE,VITE_API_URL,FRONTEND_API_URL
          script: |
            set -e
            export APP_DIR=~/rails_demo
            export DEPLOY_ENV=staging
            export GITHUB_REPO='${{ github.repository }}'
            export GITHUB_TOKEN='${{ secrets.DEPLOY_GITHUB_TOKEN }}'

            if command -v apt-get >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl git
            elif command -v dnf >/dev/null 2>&1; then
              command -v git >/dev/null 2>&1 || sudo dnf install -y git
            elif command -v yum >/dev/null 2>&1; then
              command -v git >/dev/null 2>&1 || sudo yum install -y git
            else
              echo "No supported package manager (apt-get, dnf, yum) found." >&2
              exit 1
            fi

            CLONE_URL="https://github.com/${GITHUB_REPO}.git"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              CLONE_URL="https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$CLONE_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main

            chmod +x scripts/ec2-bootstrap.sh
            exec bash scripts/ec2-bootstrap.sh

  deploy-production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || secrets.FRONTEND_API_URL || '/api' }}
          FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL || secrets.VITE_API_URL || '/api' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,JWT_SECRET,SECRET_KEY_BASE,VITE_API_URL,FRONTEND_API_URL
          script: |
            set -e
            export APP_DIR=~/rails_demo
            export DEPLOY_ENV=production
            export GITHUB_REPO='${{ github.repository }}'
            export GITHUB_TOKEN='${{ secrets.DEPLOY_GITHUB_TOKEN }}'

            if command -v apt-get >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl git
            elif command -v dnf >/dev/null 2>&1; then
              command -v git >/dev/null 2>&1 || sudo dnf install -y git
            elif command -v yum >/dev/null 2>&1; then
              command -v git >/dev/null 2>&1 || sudo yum install -y git
            else
              echo "No supported package manager (apt-get, dnf, yum) found." >&2
              exit 1
            fi

            CLONE_URL="https://github.com/${GITHUB_REPO}.git"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              CLONE_URL="https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$CLONE_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin --tags
            git checkout "${{ github.ref_name }}"

            chmod +x scripts/ec2-bootstrap.sh
            exec bash scripts/ec2-bootstrap.sh
